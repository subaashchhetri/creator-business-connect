<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">
  <div class="max-w-4xl mx-auto space-y-6">
    <div class="flex justify-between items-center border-b border-slate-700 pb-4">
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">Find Creators</h1>
      <span class="bg-indigo-500/10 text-indigo-400 text-sm font-semibold px-4 py-1.5 rounded-full border border-indigo-500/20">💼 Business Account</span>
    </div>

    <p class="text-slate-400">Browse elite content creators. Click "Hire Now" to call them immediately.</p>

    <!-- Demo Creator List -->
    <div class="grid md:grid-cols-2 gap-4 mt-6">
      <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl flex flex-col justify-between">
        <div>
          <div class="flex items-center gap-3">
            <div class="text-2xl">📸</div>
            <div>
              <h3 class="text-lg font-bold text-white">Subash Chhetri</h3>
              <p class="text-xs text-slate-400">Tech & Lifestyle Creator</p>
            </div>
          </div>
          <p class="text-slate-400 text-sm mt-4">I build high-engagement video content for brands looking to scale on TikTok and YouTube.</p>
        </div>
        <!-- This button calls the phone number directly -->
        <a href="tel:9800565362" class="block text-center mt-6 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition">
          📞 Hire Now (Call)
        </a>
      </div>
    </div>
  </div>
</body>
</html>

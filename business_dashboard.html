<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-24">

  <header class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <h1 id="page-title" class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
      Find Creators
    </h1>
    <button onclick="handleLogout()" class="bg-slate-700 hover:bg-rose-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition cursor-pointer">
      Logout 👋
    </button>
  </header>

  <main class="max-w-xl mx-auto p-4">
    
    <div id="view-home" class="space-y-4">
      <p class="text-slate-400 text-sm">Browse outstanding creators looking for brand collaborations.</p>
      <div id="creators-feed" class="space-y-4">
        <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl flex flex-col justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center text-xl font-bold border border-slate-600 overflow-hidden">📸</div>
            <div>
              <h3 class="text-lg font-bold text-white">Subash Chhetri</h3>
              <p class="text-xs text-indigo-400">Tech & Lifestyle Creator</p>
            </div>
          </div>
          <p class="text-slate-400 text-sm mt-3">I build high-engagement video content for brands looking to scale on TikTok and YouTube.</p>
          <a href="tel:9800565362" class="block text-center mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-xl transition text-sm">
            📞 Hire Now (Call)
          </a>
        </div>
      </div>
    </div>

    <div id="view-search" class="hidden space-y-4">
      <input type="text" placeholder="Search creators by name..." class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none text-sm">
    </div>

    <div id="view-post" class="hidden bg-slate-800 border border-slate-700 p-6 rounded-2xl space-y-4">
      <h2 class="text-xl font-bold text-white">Create a Job Listing</h2>
      <form id="job-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Company Name</label>
          <input type="text" id="job-company" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Project Title</label>
          <input type="text" id="job-title" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Project Details</label>
          <textarea id="job-details" rows="3" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm"></textarea>
        </div>
        <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition text-sm cursor-pointer">📢 Post Project</button>
      </form>
    </div>

    <div id="view-profile" class="hidden bg-slate-800 border border-slate-700 p-6 rounded-2xl space-y-4">
      <h3 class="text-xl font-bold text-white">Update Brand Profile</h3>
      <input type="text" value="Your Business" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm">
      <button onclick="alert('Profile Saved!')" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-sm cursor-pointer">💾 Save Profile</button>
    </div>

  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur-md border-t border-slate-700 px-4 py-2 z-50">
    <div class="max-w-xl mx-auto flex justify-around items-center">
      <button id="nav-home" onclick="switchTab('home')" class="flex flex-col items-center py-1 text-indigo-400 font-bold text-xs cursor-pointer"><span class="text-xl mb-0.5">🏠</span> Home</button>
      <button id="nav-search" onclick="switchTab('search')" class="flex flex-col items-center py-1 text-slate-400 text-xs cursor-pointer"><span class="text-xl mb-0.5">🔍</span> Search</button>
      <button id="nav-post" onclick="switchTab('post')" class="flex flex-col items-center py-1 text-slate-400 text-xs cursor-pointer"><span class="text-xl mb-0.5">➕</span> Post Work</button>
      <button id="nav-profile" onclick="switchTab('profile')" class="flex flex-col items-center py-1 text-slate-400 text-xs cursor-pointer"><span class="text-xl mb-0.5">👤</span> Profile</button>
    </div>
  </nav>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhAKv-jzS0tCIJCXfqiV6KmcaabUn8904",
      authDomain: "creator-business-connect.firebaseapp.com",
      projectId: "creator-business-connect",
      storageBucket: "creator-business-connect.firebasestorage.app",
      messagingSenderId: "754435602005",
      appId: "1:754435602005:web:068fe02c5ade2fe40306dc",
      measurementId: "G-G0C32CWESE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.switchTab = (viewName) => {
      ['home', 'search', 'post', 'profile'].forEach(tab => {
        document.getElementById(`view-${tab}`).classList.toggle('hidden', tab !== viewName);
        document.getElementById(`nav-${tab}`).className = tab === viewName 
          ? "flex flex-col items-center py-1 text-indigo-400 font-bold text-xs cursor-pointer" 
          : "flex flex-col items-center py-1 text-slate-400 text-xs cursor-pointer";
      });
    };

    document.getElementById('job-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const company = document.getElementById('job-company').value;
      const title = document.getElementById('job-title').value;
      const details = document.getElementById('job-details').value;

      try {
        // Send directly to the cloud
        await addDoc(collection(db, "jobs"), {
          company: company,
          title: title,
          details: details,
          createdAt: new Date().toISOString()
        });
        alert("🎉 Job posted live to the Firebase cloud database!");
        document.getElementById('job-form').reset();
        window.switchTab('home');
      } catch (error) {
        alert("Database error: " + error.message);
      }
    });

    window.handleLogout = () => {
      localStorage.clear();
      window.location.href = 'index.html';
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    /* Hide scrollbars for cleaner appearance */
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-24">

  <header class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <h1 id="page-title" class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
      Find Creators
    </h1>
    <span class="bg-indigo-500/10 text-indigo-400 text-xs font-semibold px-3 py-1 rounded-full border border-indigo-500/20">
      💼 Business Account
    </span>
  </header>

  <main class="max-w-xl mx-auto p-4">
    
    <div id="view-home" class="space-y-4">
      <p class="text-slate-400 text-sm">Browse outstanding creators looking for brand collaborations.</p>
      <div id="creators-feed" class="space-y-4">
        <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl flex flex-col justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center text-xl font-bold border border-slate-600 overflow-hidden">
              📸
            </div>
            <div>
              <h3 class="text-lg font-bold text-white">Subash Chhetri</h3>
              <p class="text-xs text-indigo-400">Tech & Lifestyle Creator</p>
            </div>
          </div>
          <p class="text-slate-400 text-sm mt-3">I build high-engagement video content for brands looking to scale on TikTok and YouTube.</p>
          <a href="tel:9800565362" class="block text-center mt-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-xl transition text-sm">
            📞 Hire Now (Call)
          </a>
        </div>
      </div>
    </div>

    <div id="view-search" class="hidden space-y-4">
      <div class="relative">
        <input type="text" id="search-bar" oninput="filterCreators()" placeholder="Search creators by name or niche..." class="w-full px-4 py-3 pl-10 bg-slate-800 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500 text-sm">
        <span class="absolute left-3 top-3.5 text-slate-500 text-sm">🔍</span>
      </div>
      <div id="search-results" class="space-y-4"></div>
    </div>

    <div id="view-post" class="hidden bg-slate-800 border border-slate-700 p-6 rounded-2xl space-y-4">
      <h2 class="text-xl font-bold text-white">Create a Job Listing</h2>
      <form id="job-form" onsubmit="submitJob(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Company Name</label>
          <input type="text" id="job-company" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Project Title</label>
          <input type="text" id="job-title" placeholder="e.g. TikTok Video Creator Needed" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Project Details & Requirements</label>
          <textarea id="job-details" rows="3" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500 text-sm"></textarea>
        </div>
        <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition text-sm cursor-pointer">
          📢 Post Project Link
        </button>
      </form>
    </div>

    <div id="view-profile" class="hidden bg-slate-800 border border-slate-700 p-6 rounded-2xl space-y-6">
      <div class="flex flex-col items-center space-y-3">
        <div class="relative group">
          <div id="profile-avatar" class="w-24 h-24 rounded-full bg-slate-700 border-2 border-indigo-500 flex items-center justify-center text-3xl overflow-hidden font-bold">
            🏢
          </div>
          <label class="absolute bottom-0 right-0 bg-indigo-600 p-2 rounded-full border border-slate-800 cursor-pointer text-xs hover:bg-indigo-500 transition">
            📷
            <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="previewImage(event)">
          </label>
        </div>
        <h3 id="display-name" class="text-xl font-bold text-white">Your Business</h3>
      </div>

      <form id="profile-form" onsubmit="saveProfile(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Business / Brand Name</label>
          <input type="text" id="profile-name" value="Your Business" required class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Contact Phone Number</label>
          <input type="tel" id="profile-phone" placeholder="Contact number for creators" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500 text-sm">
        </div>
        <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition text-sm cursor-pointer">
          💾 Save Changes
        </button>
      </form>
    </div>

  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur-md border-t border-slate-700 px-4 py-2 z-50">
    <div class="max-w-xl mx-auto flex justify-around items-center">
      
      <button id="nav-home" onclick="switchTab('home')" class="flex flex-col items-center justify-center py-1 text-indigo-400 font-bold text-xs transition cursor-pointer">
        <span class="text-xl mb-0.5">🏠</span> Home
      </button>

      <button id="nav-search" onclick="switchTab('search')" class="flex flex-col items-center justify-center py-1 text-slate-400 hover:text-slate-200 text-xs transition cursor-pointer">
        <span class="text-xl mb-0.5">🔍</span> Search
      </button>

      <button id="nav-post" onclick="switchTab('post')" class="flex flex-col items-center justify-center py-1 text-slate-400 hover:text-slate-200 text-xs transition cursor-pointer">
        <span class="text-xl mb-0.5">➕</span> Post Work
      </button>

      <button id="nav-profile" onclick="switchTab('profile')" class="flex flex-col items-center justify-center py-1 text-slate-400 hover:text-slate-200 text-xs transition cursor-pointer">
        <span class="text-xl mb-0.5">👤</span> Profile
      </button>

    </div>
  </nav>

  <script>
    // System Tab Switching
    function switchTab(viewName) {
      const tabs = ['home', 'search', 'post', 'profile'];
      
      tabs.forEach(tab => {
        const viewEl = document.getElementById(`view-${tab}`);
        const navEl = document.getElementById(`nav-${tab}`);
        
        if (tab === viewName) {
          viewEl.classList.remove('hidden');
          navEl.className = "flex flex-col items-center justify-center py-1 text-indigo-400 font-bold text-xs transition cursor-pointer";
        } else {
          viewEl.classList.add('hidden');
          navEl.className = "flex flex-col items-center justify-center py-1 text-slate-400 hover:text-slate-200 text-xs transition cursor-pointer";
        }
      });

      // Update Header Title dynamically
      const titles = { home: 'Find Creators', search: 'Search Creators', post: 'Post Work', profile: 'Business Profile' };
      document.getElementById('page-title').innerText = titles[viewName];
    }

    // Save Brand Profile Changes locally
    let base64Avatar = "";
    function previewImage(event) {
      const file = event.target.files[0];
      const reader = new FileReader();
      reader.onloadend = function() {
        base64Avatar = reader.result;
        document.getElementById('profile-avatar').innerHTML = `<img src="${base64Avatar}" class="w-full h-full object-cover">`;
      }
      if (file) reader.readAsDataURL(file);
    }

    function saveProfile(e) {
      e.preventDefault();
      const bName = document.getElementById('profile-name').value;
      document.getElementById('display-name').innerText = bName;
      alert("Profile updated successfully!");
    }

    // Handle Submitting a New Job Post
    function submitJob(e) {
      e.preventDefault();
      const company = document.getElementById('job-company').value;
      const title = document.getElementById('job-title').value;
      const details = document.getElementById('job-details').value;

      const newJob = { company, title, details, date: new Date().toISOString() };

      // Append to list array stored globally inside local storage shared memory 
      let activeJobs = JSON.parse(localStorage.getItem('platformJobs')) || [];
      activeJobs.unshift(newJob);
      localStorage.setItem('platformJobs', JSON.stringify(activeJobs));

      alert("🎉 Job posted successfully! Creators will see it on their feeds.");
      document.getElementById('job-form').reset();
      switchTab('home');
    }
  </script>
</body>
</html>

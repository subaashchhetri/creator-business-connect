<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Business Connect</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div id="landing-page" class="max-w-md w-full text-center space-y-8 transform transition-all duration-300">
    <div>
      <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
        Connect & Collaborate
      </h1>
      <p class="mt-3 text-slate-400 text-lg">Choose your role to get started.</p>
    </div>

    <div class="space-y-4">
      <button onclick="selectRole('business')" class="w-full flex items-center justify-between p-5 bg-slate-800 hover:bg-slate-700/80 border border-slate-700 hover:border-indigo-500 rounded-2xl transition duration-300 group cursor-pointer">
        <div class="text-left">
          <span class="block text-xl font-bold text-white">Business Owner</span>
          <span class="block text-sm text-slate-400 mt-1">I want to hire creators</span>
        </div>
        <div class="p-3 bg-indigo-500/10 text-indigo-400 rounded-xl group-hover:bg-indigo-500 group-hover:text-white transition">💼</div>
      </button>

      <button onclick="selectRole('creator')" class="w-full flex items-center justify-between p-5 bg-slate-800 hover:bg-slate-700/80 border border-slate-700 hover:border-emerald-500 rounded-2xl transition duration-300 group cursor-pointer">
        <div class="text-left">
          <span class="block text-xl font-bold text-white">Content Creator</span>
          <span class="block text-sm text-slate-400 mt-1">I want to find deals</span>
        </div>
        <div class="p-3 bg-emerald-500/10 text-emerald-400 rounded-xl group-hover:bg-emerald-500 group-hover:text-white transition">✨</div>
      </button>
    </div>
  </div>

  <div id="auth-page" class="hidden max-w-md w-full bg-slate-800 border border-slate-700 p-8 rounded-2xl shadow-xl transform transition-all duration-300 opacity-0 scale-95">
    
    <div class="flex items-center justify-between mb-6">
      <button onclick="goBack()" class="text-sm text-slate-400 hover:text-white flex items-center gap-1 cursor-pointer">
        ← Back
      </button>
      <span id="role-badge"></span>
    </div>

    <div class="flex border-b border-slate-700 mb-6">
      <button id="tab-login" onclick="switchTab('login')" class="flex-1 pb-3 text-center font-semibold text-indigo-400 border-b-2 border-indigo-500 transition-all cursor-pointer">
        Log In
      </button>
      <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 pb-3 text-center font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-200 transition-all cursor-pointer">
        Sign Up
      </button>
    </div>

    <form id="form-login" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
        <input type="email" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
        <input type="password" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit" class="w-full py-3 mt-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition cursor-pointer">
        Enter Dashboard
      </button>
    </form>

    <form id="form-signup" class="space-y-4 hidden">
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Full Name</label>
        <input type="text" placeholder="John Doe" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
        <input type="email" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone Number</label>
        <input type="tel" placeholder="1234567890" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
        <input type="password" required class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit" class="w-full py-3 mt-2 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition cursor-pointer">
        Create Account
      </button>
    </form>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDhAKv-jzS0tCIJCXfqiV6KmcaabUn8904",
      authDomain: "creator-business-connect.firebaseapp.com",
      projectId: "creator-business-connect",
      storageBucket: "creator-business-connect.firebasestorage.app",
      messagingSenderId: "754435602005",
      appId: "1:754435602005:web:068fe02c5ade2fe40306dc",
      measurementId: "G-G0C32CWESE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const landingPage = document.getElementById('landing-page');
    const authPage = document.getElementById('auth-page');
    const roleBadge = document.getElementById('role-badge');
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const formLogin = document.getElementById('form-login');
    const formSignup = document.getElementById('form-signup');

    window.addEventListener('DOMContentLoaded', () => {
      const savedRole = localStorage.getItem('userRole');
      if (savedRole) showAuthPage(savedRole);
    });

    window.selectRole = (role) => {
      localStorage.setItem('userRole', role);
      landingPage.classList.add('opacity-0', 'scale-95');
      setTimeout(() => {
        landingPage.classList.add('hidden');
        showAuthPage(role);
      }, 300);
    };

    window.goBack = () => {
      localStorage.removeItem('userRole');
      authPage.classList.add('opacity-0', 'scale-95');
      setTimeout(() => {
        authPage.classList.add('hidden');
        landingPage.classList.remove('hidden');
        setTimeout(() => landingPage.classList.remove('opacity-0', 'scale-95'), 50);
      }, 300);
    };

    window.switchTab = (tab) => {
      if (tab === 'login') {
        tabLogin.className = "flex-1 pb-3 text-center font-semibold text-indigo-400 border-b-2 border-indigo-500 transition-all cursor-pointer";
        tabSignup.className = "flex-1 pb-3 text-center font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-200 transition-all cursor-pointer";
        formLogin.classList.remove('hidden');
        formSignup.classList.add('hidden');
      } else {
        tabSignup.className = "flex-1 pb-3 text-center font-semibold text-indigo-400 border-b-2 border-indigo-500 transition-all cursor-pointer";
        tabLogin.className = "flex-1 pb-3 text-center font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-200 transition-all cursor-pointer";
        formSignup.classList.remove('hidden');
        formLogin.classList.add('hidden');
      }
    };

    function showAuthPage(role) {
      roleBadge.innerText = role === 'business' ? '💼 Business Owner' : '✨ Creator';
      roleBadge.className = role === 'creator' 
        ? "text-xs font-semibold uppercase tracking-wider px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20"
        : "text-xs font-semibold uppercase tracking-wider px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20";

      authPage.classList.remove('hidden');
      setTimeout(() => authPage.classList.remove('opacity-0', 'scale-95'), 50);
    }

    formLogin.addEventListener('submit', handleLogin);
    formSignup.addEventListener('submit', handleSignup);

    async function handleSignup(event) {
      event.preventDefault();
      const fullName = formSignup.querySelector('input[placeholder="John Doe"]').value;
      const email = formSignup.querySelector('input[type="email"]').value;
      const phone = formSignup.querySelector('input[type="tel"]').value;
      const password = formSignup.querySelector('input[type="password"]').value;
      const role = localStorage.getItem('userRole');

      if (!role) {
        alert("Error: Role selection missing.");
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          fullName: fullName,
          email: email,
          phone: phone,
          role: role,
          createdAt: new Date().toISOString()
        });

        alert("Account created successfully!");
        redirectBasedOnRole(role);
      } catch (error) {
        alert(`Signup Failed: ${error.message}`);
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      const email = formLogin.querySelector('input[type="email"]').value;
      const password = formLogin.querySelector('input[type="password"]').value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const userData = docSnap.data();
          const role = userData.role;
          localStorage.setItem('userRole', role);
          redirectBasedOnRole(role);
        } else {
          alert("User record not found.");
        }
      } catch (error) {
        alert(`Login Failed: ${error.message}`);
      }
    }

    function redirectBasedOnRole(role) {
      if (role === 'creator') {
        window.location.href = 'creator_dashboard.html';
      } else if (role === 'business') {
        window.location.href = 'business_dashboard.html';
      } else {
        alert("Invalid role detected.");
      }
    }
  </script>
</body>
</html>

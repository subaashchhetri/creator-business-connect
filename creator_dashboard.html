<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-24">

  <header class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">Creator Feed</h1>
    <span class="bg-emerald-500/10 text-emerald-400 text-xs font-semibold px-3 py-1 rounded-full border border-emerald-500/20">✨ Active Creator</span>
  </header>

  <main class="max-w-xl mx-auto p-4 space-y-4">
    <p class="text-slate-400 text-sm">Open Brand Requests. Apply to instantly send them your profile information.</p>
    
    <div id="jobs-container" class="space-y-4">
      </div>
  </main>

  <script>
    function displayJobs() {
      const container = document.getElementById('jobs-container');
      const jobs = JSON.parse(localStorage.getItem('platformJobs')) || [];

      if(jobs.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-slate-500 border-2 border-dashed border-slate-800 rounded-2xl">
            No brand job posts available yet. Check back soon!
          </div>`;
        return;
      }

      container.innerHTML = jobs.map((job, index) => `
        <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl space-y-3">
          <div>
            <span class="text-xs font-bold uppercase tracking-wider text-indigo-400">💼 ${job.company}</span>
            <h3 class="text-lg font-bold text-white mt-0.5">${job.title}</h3>
            <p class="text-slate-400 text-sm mt-2">${job.details}</p>
          </div>
          <button onclick="applyJob(${index}, this)" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition text-sm cursor-pointer">
            Apply Now
          </button>
        </div>
      `).join('');
    }

    function applyJob(index, button) {
      button.innerText = "✓ Applied";
      button.className = "w-full py-2.5 bg-slate-700 text-slate-400 font-bold rounded-xl transition text-sm cursor-not-allowed";
      button.disabled = true;
      alert("Application sent! The business owner has been notified.");
    }

    // Auto load on enter
    window.onload = displayJobs;
  </script>
</body>
</html>

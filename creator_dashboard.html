<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">
  <div class="max-w-4xl mx-auto space-y-6">
    <div class="flex justify-between items-center border-b border-slate-700 pb-4">
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">Creator Feed</h1>
      <span class="bg-emerald-500/10 text-emerald-400 text-sm font-semibold px-4 py-1.5 rounded-full border border-emerald-500/20">✨ Active Creator</span>
    </div>
    
    <p class="text-slate-400">Welcome! Here are projects posted by Business Owners. Click "Apply Now" to show interest.</p>

    <!-- Demo Post Feed -->
    <div class="space-y-4 mt-6">
      <div class="bg-slate-800 border border-slate-700 p-6 rounded-2xl flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <span class="text-xs font-bold uppercase tracking-wider text-indigo-400">💼 Nike Marketing Team</span>
          <h3 class="text-xl font-bold text-white mt-1">Video Editor Needed for Summer Campaign</h3>
          <p class="text-slate-400 text-sm mt-2">Looking for a creator to make 5 short reels/TikToks showcasing our new shoes. Pay is $500.</p>
        </div>
        <button onclick="alert('Applied! The business owner has been notified.')" class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-xl font-bold transition whitespace-nowrap cursor-pointer">
          Apply Now
        </button>
      </div>
    </div>
  </div>
</body>
</html>

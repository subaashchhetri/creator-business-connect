<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

  <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 bg-emerald-600 rounded-xl flex items-center justify-center text-white">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
          </div>
          <span class="text-xl font-bold tracking-tight text-slate-900">CreatorHub</span>
        </div>
        <div class="flex items-center gap-4">
          <span id="creator-name" class="text-sm font-medium text-slate-600">Loading profile...</span>
          <button id="btn-logout" class="text-sm font-semibold text-rose-600 hover:bg-rose-50 px-3 py-2 rounded-lg transition-colors">
            Log Out
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 py-8">
    <div class="space-y-2 mb-8">
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Project Feed</h1>
      <p class="text-slate-500">Explore open gigs posted by verified Business Owners and apply instantly.</p>
    </div>

    <div id="feed-container" class="space-y-6">
      <div class="animate-pulse bg-white p-6 rounded-2xl border border-slate-100 space-y-4">
        <div class="h-4 bg-slate-200 rounded w-1/4"></div>
        <div class="h-4 bg-slate-200 rounded w-3/4"></div>
        <div class="h-10 bg-slate-200 rounded w-full"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
      getFirestore, 
      doc, 
      getDoc, 
      collection, 
      getDocs, 
      addDoc, 
      query, 
      where 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- PASTE YOUR EXACT SAME CONFIG HERE ---
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY_HERE",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Global App Variables
    let currentCreator = null;
    let appliedProjectIds = [];

    // DOM Elements
    const creatorNameEl = document.getElementById('creator-name');
    const feedContainer = document.getElementById('feed-container');
    const btnLogout = document.getElementById('btn-logout');

    // 1. ROUTING GUARD & AUTH STATE
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        // Force redirect if not logged in
        window.location.href = 'index.html';
        return;
      }

      // Fetch Profile Details from Firestore
      const docRef = doc(db, "users", user.uid);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists() && docSnap.data().role === 'creator') {
        currentCreator = { uid: user.uid, ...docSnap.data() };
        creatorNameEl.innerText = `✨ ${currentCreator.fullName}`;
        
        // Fetch existing applications to prevent double entries on load
        await fetchUserApplications();
        // Render the business feeds
        fetchProjectFeed();
      } else {
        // Security fallback if a business owner attempts manual url swapping
        alert("Access Denied: Creators only.");
        window.location.href = 'index.html';
      }
    });

    // 2. CHECK ALREADY APPLIED GIGS
    async function fetchUserApplications() {
      const q = query(collection(db, "notifications"), where("creatorId", "==", currentCreator.uid));
      const querySnapshot = await getDocs(q);
      querySnapshot.forEach((doc) => {
        appliedProjectIds.push(doc.data().postId);
      });
    }

    // 3. FETCH & DISPLAY ALL BUSINESS POSTS
    async function fetchProjectFeed() {
      try {
        const postsSnapshot = await getDocs(collection(db, "posts"));
        
        // Clear loading skeleton
        feedContainer.innerHTML = '';

        if (postsSnapshot.empty) {
          feedContainer.innerHTML = `
            <div class="text-center p-12 bg-white rounded-2xl border border-slate-100">
              <p class="text-slate-400">No projects listed at the moment. Check back soon!</p>
            </div>`;
          return;
        }

        postsSnapshot.forEach((postDoc) => {
          const postData = postDoc.data();
          const postId = postDoc.id;
          const hasApplied = appliedProjectIds.includes(postId);

          // Build Post Card UI
          const card = document.createElement('div');
          card.className = "bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between items-start gap-4 md:flex-row md:items-center transition-all hover:shadow-md";
          
          card.innerHTML = `
            <div class="space-y-2 flex-1">
              <div class="flex items-center gap-2">
                <span class="text-xs font-semibold uppercase tracking-wider px-2.5 py-0.5 rounded-md bg-indigo-50 text-indigo-700">
                  ${postData.businessName || 'Verified Business'}
                </span>
              </div>
              <h3 class="text-xl font-bold text-slate-900">${postData.title || 'Untitled Role'}</h3>
              <p class="text-slate-600 text-sm leading-relaxed">${postData.description || 'No job description provided.'}</p>
              ${postData.budget ? `<p class="text-sm font-semibold text-emerald-600"><i class="fa-solid fa-wallet mr-1"></i> Budget: ${postData.budget}</p>` : ''}
            </div>
            <div class="w-full md:w-auto pt-2 md:pt-0">
              <button 
                id="btn-${postId}" 
                class="w-full md:w-auto px-6 py-2.5 font-semibold text-sm rounded-xl transition-all shadow-sm
                  ${hasApplied 
                    ? 'bg-slate-100 text-slate-400 cursor-not-allowed' 
                    : 'bg-emerald-600 text-white hover:bg-emerald-700 hover:shadow'}"
                ${hasApplied ? 'disabled' : ''}
              >
                ${hasApplied ? '<i class="fa-solid fa-check mr-1"></i> Applied' : 'Apply Now'}
              </button>
            </div>
          `;

          feedContainer.appendChild(card);

          // Event Listener for dynamically generated Apply button
          if (!hasApplied) {
            document.getElementById(`btn-${postId}`).addEventListener('click', () => {
              applyToProject(postId, postData);
            });
          }
        });

      } catch (error) {
        console.error("Error pulling database feed: ", error);
        feedContainer.innerHTML = `<p class="text-rose-500">Could not retrieve feed data. Configuration issue.</p>`;
      }
    }

    // 4. ACTION: APPLY NOW
    async function applyToProject(postId, postData) {
      const button = document.getElementById(`btn-${postId}`);
      
      // Optmistic UI Change (Prevent multi-clicks processing)
      button.disabled = true;
      button.innerText = "Applying...";

      try {
        // Send custom transaction data structure to the Business Owner's path
        await addDoc(collection(db, "notifications"), {
          postId: postId,
          projectTitle: postData.title,
          businessId: postData.businessId, // Must match the poster's Auth UID
          creatorId: currentCreator.uid,
          creatorName: currentCreator.fullName,
          creatorEmail: currentCreator.email,
          creatorPhone: currentCreator.phone,
          appliedAt: new Date().toISOString(),
          status: "pending"
        });

        // Permanently set local UI elements to "Applied"
        button.className = "w-full md:w-auto px-6 py-2.5 font-semibold text-sm rounded-xl bg-slate-100 text-slate-400 cursor-not-allowed shadow-none";
        button.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Applied';
        appliedProjectIds.push(postId);

      } catch (error) {
        console.error("Application processing error: ", error);
        alert("Failed to send application data. Try again.");
        button.disabled = false;
        button.innerText = "Apply Now";
      }
    }

    // 5. HANDLE LOGOUT
    btnLogout.addEventListener('click', () => {
      signOut(auth).then(() => {
        localStorage.removeItem('userRole');
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>creator_dashboard

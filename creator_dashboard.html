<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-24">

  <header class="bg-slate-800/50 backdrop-blur-md border-b border-slate-700 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <h1 id="creator-title" class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
      Creator Feed
    </h1>
    <button onclick="handleLogout()" class="bg-slate-700 hover:bg-rose-600 text-white text-xs font-bold px-3 py-1.5 rounded-xl transition cursor-pointer">
      Logout 👋
    </button>
  </header>

  <main class="max-w-xl mx-auto p-4">
    
    <div id="view-home" class="space-y-4">
      <p class="text-slate-400 text-sm">Open Job Orders. Apply to instantly notify the Brand managers.</p>
      <div id="jobs-container" class="space-y-4"></div>
    </div>

    <div id="view-profile" class="hidden bg-slate-800 border border-slate-700 p-6 rounded-2xl space-y-4">
      <h3 class="text-xl font-bold text-white">Update Creator Profile</h3>
      <input type="text" placeholder="Your Bio Niche" class="w-full px-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-white text-sm">
      <button onclick="alert('Profile Updated!')" class="w-full py-3 bg-emerald-600 text-white font-bold rounded-xl text-sm cursor-pointer">💾 Save Profile</button>
    </div>

  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur-md border-t border-slate-700 px-4 py-2 z-50">
    <div class="max-w-xl mx-auto flex justify-around items-center">
      <button id="nav-home" onclick="switchTab('home')" class="flex flex-col items-center py-1 text-emerald-400 font-bold text-xs cursor-pointer"><span class="text-xl mb-0.5">🏠</span> Home Feed</button>
      <button id="nav-profile" onclick="switchTab('profile')" class="flex flex-col items-center py-1 text-slate-400 text-xs cursor-pointer"><span class="text-xl mb-0.5">👤</span> My Profile</button>
    </div>
  </nav>

  <script>
    function switchTab(viewName) {
      ['home', 'profile'].forEach(tab => {
        document.getElementById(`view-${tab}`).classList.toggle('hidden', tab !== viewName);
        document.getElementById(`nav-${tab}`).className = tab === viewName 
          ? "flex flex-col items-center py-1 text-emerald-400 font-bold text-xs cursor-pointer" 
          : "flex flex-col items-center py-1 text-slate-400 text-xs cursor-pointer";
      });
      document.getElementById('creator-title').innerText = viewName === 'home' ? 'Creator Feed' : 'My Profile';
    }

    function displayJobs() {
      const container = document.getElementById('jobs-container');
      const jobs = JSON.parse(localStorage.getItem('platformJobs')) || [];

      if(jobs.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-slate-500 border-2 border-dashed border-slate-800 rounded-2xl">No open project postings found.</div>`;
        return;
      }

      container.innerHTML = jobs.map((job) => `
        <div class="bg-slate-800 border border-slate-700 p-5 rounded-2xl space-y-3">
          <div>
            <span class="text-xs font-bold uppercase tracking-wider text-indigo-400">💼 ${job.company}</span>
            <h3 class="text-lg font-bold text-white mt-0.5">${job.title}</h3>
            <p class="text-slate-400 text-sm mt-2">${job.details}</p>
          </div>
          <button onclick="applyJob(this)" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition text-sm cursor-pointer">Apply Now</button>
        </div>
      `).join('');
    }

    function applyJob(button) {
      button.innerText = "✓ Applied";
      button.className = "w-full py-2.5 bg-slate-700 text-slate-400 font-bold rounded-xl text-sm cursor-not-allowed";
      button.disabled = true;
      alert("Application sent successfully to the brand!");
    }

    function handleLogout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    window.onload = displayJobs;
  </script>
</body>
</html>
